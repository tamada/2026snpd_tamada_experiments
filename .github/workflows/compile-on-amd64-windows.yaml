name: compile bzip2 (amd64)
on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    name: Build for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Create dist directory.
        run: mkdir -p dist

      - name: Build bzip2c with msvc for Windows
        shell: bash
        continue-on-error: true
        run: |
          cd bzip2/bzip2
          nmake -f makefile.msc
          cp bzip2.exe ../../dist/bzip2_amd64_windows_msvc.exe

      - name: Build bzip2c with gcc
        shell: bash
        continue-on-error: true
        run: |
          cd bzip2/bzip2
          gcc --version
          make clean
          make
          cp bzip2.exe ../../dist/bzip2_amd64_windows_gcc.exe

      - name: Build bzip2c with clang
        shell: bash
        continue-on-error: true
        run: |
          cd bzip2/bzip2
          clang --version
          make clean
          # compile all at once without Makefile (because Makefile assumes in use of gcc)
          clang -O2 -g -D_FILE_OFFSET_BITS=64 -o bzip2.exe bzip2.c blocksort.c huffman.c crctable.c randtable.c compress.c decompress.c bzlib.c
          cp bzip2.exe ../../dist/bzip2_amd64_windows_clang.exe

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables-amd64-windows
          path: dist
