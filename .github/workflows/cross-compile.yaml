name: compile on macOS
on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            extension: ''
            arch: arm64
            target: aarch64-apple-darwin
          - os: macos-26-intel
            extension: ''
            arch: amd64
            target: x86_64-apple-darwin
            
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive
      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Setup Rust
        run: |
          mkdir -p dist
          rustup update stable
          rustup target add ${{ matrix.target }}
          cargo install cargo-zigbuild

      - name: Build bzip2c on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo ${{ runner.os }} ${{ matrix.arch }}
          gcc-14 --version
          clang --version
          cd bzip2/bzip2
          make CC=gcc-14
          cp bzip2${{ matrix.extension }} ../../dist/bzip2-gcc-${{ matrix.target }}${{ matrix.extension }}

          make clean
          make CC=clang
          cp bzip2${{ matrix.extension }} ../../dist/bzip2-clang-${{ matrix.target }}${{ matrix.extension }}

      - name: Build Rust
        shell: bash
        run: |
          cd bzip2/bzip2rs
          cargo zigbuild --release --features sys --target ${{ matrix.target }} --target-dir target/sys
          cargo zigbuild --release --target ${{ matrix.target }}                --target-dir target/pure
          # cargo build --release --features sys --target-dir target/sys
          # cargo build --release                --target-dir target/pure
          ls -R target
          cp target/sys/${{ matrix.target }}/release/bzip2rs  ../../dist/bzip2rs-sys-${{ matrix.target }}
          cp target/pure/${{ matrix.target }}/release/bzip2rs ../../dist/bzip2rs-pure-${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables_${{ matrix.arch }}_${{ runner.os }}
          path: dist
