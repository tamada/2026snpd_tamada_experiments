name: corss-compile
on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extension: ''
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            extension: ''
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            extension: ''
            arch: arm64
            target: aarch64-apple-darwin
          - os: macos-latest
            extension: ''
            arch: amd64
            target: x86_64-apple-darwin
          - os: windows-latest
            extension: '.exe'
            arch: arm64
            target: aarch64-pc-windows-gnu
          - os: windows-latest
            extension: '.exe'
            arch: arm64
            target: aarch64-pc-windows-gnu
            
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          submodules: recursive

      - name: Setup Rust
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Setup TinyGo
        uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: '0.40.0'

      - name: Build Rust
        shell: bash
        run: |
          mkdir -p dist
          cd bzip2/bzip2rs
          cargo build --release --features sys --target ${{ matrix.target }} --target-dir target/sys
          cargo build --release --target ${{ matrix.target }}                --target-dir target/pure
          cp target/sys/${{ matrix.target }}/release/bzip2rs  ../../dist/bzip2rs-sys-${{ matrix.target }}
          cp target/pure/${{ matrix.target }}/release/bzip2rs ../../dist/bzip2rs-pure-${{ matrix.target }}

      - name: Build C
        shell: bash
        run: |
          cd bzip2/bzip2
          make
          cp bzip2${{ matrix.extension }} ../../dist/bzip2-gcc-${{ matrix.target }}${{ matrix.extension }}

          make clean
          make CC=clang
          cp bzip2${{ matrix.extension }} ../../dist/bzip2-clang-${{ matrix.target }}${{ matrix.extension }}

      - name: Build Go
        shell: bash
        run: |
          cd bzip2/bzip2go
          go build -o ../../dist/bzip2-go-${{ matrix.target }}${{ matrix.extension }} cmd/bzip2/main.go

      - name: Build with TinyGo
        shell: bash
        run: |
          cd bzip2/bzip2go
          tinygo build -o ../../dist/bzip2-tinygo-${{ matrix.target }}${{ matrix.extension }} cmd/bzip2/main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables-${{ matrix.target }}
          path: dist
